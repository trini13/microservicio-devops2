name: CI Pipeline - Microservicio DevOps

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Verificar que la app inicia
        run: |
          python -c "from app import app; print('App importada correctamente')"

      - name: Mostrar version de Python
        run: python --version

      - name: Mensaje de exito
        run: echo "Pipeline CI ejecutado correctamente en rama ${{ github.ref_name }}"